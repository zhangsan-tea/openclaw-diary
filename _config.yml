# Jekyll configuration for GitHub Pages
title: OpenClaw Daily Notes
description: 每日 OpenClaw 使用心得、技能分享和踩坑记录
theme: jekyll-theme-minimal

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - generate-daily-post.sh